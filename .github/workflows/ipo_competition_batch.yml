name: IPO competition batch

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 0-6 * * 1-5"
    - cron: "*/5 6-9 * * 1-5"

permissions:
  contents: write

concurrency:
  group: ipo-competition-batch
  cancel-in-progress: false

jobs:
  update-ipo-competition:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Generate JSON
        run: dart run tool/ipo_competition_batch.dart --backfill-years 3 --live-dir data/live_snapshots --outcome-dir data/outcomes --broker-snapshot-dir data/broker_snapshots
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          ITICK_API_KEY: ${{ secrets.ITICK_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}

      - name: Commit generated data
        run: |
          if git diff --quiet -- data/discovered ipo_competition_data; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "ipo-competition-bot"
          git config user.email "ipo-competition-bot@users.noreply.github.com"
          git add data/discovered ipo_competition_data
          git commit -m "Update IPO competition data"
          git push
